<div class="auth-container">
  <h2>Crear cuenta en KanbanSync</h2>

  @if (successMessage) {
    <div class="success-message">🎉 {{ successMessage }}</div>
  }

  @if (errorMessage) {
    <div class="error-message">⚠️ {{ errorMessage }}</div>
  }

  <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
    <div class="form-group">
      <label>Email:</label>
      <input formControlName="email" type="email" placeholder="ejemplo@correo.com">
    </div>

    <div class="form-group">
      <label>Contraseña:</label>
      <input formControlName="password" type="password" placeholder="Mínimo 6 caracteres">
    </div>

    <button type="submit" [disabled]="registerForm.invalid">Registrarse</button>
    <p>¿Ya tienes una cuenta? <a routerLink="/login">Inicia sesión</a></p>
  </form>
</div>
