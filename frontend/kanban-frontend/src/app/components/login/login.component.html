<div class="auth-container">
  <h2>Bienvenido a KanbanSync</h2>

  @if (errorMessage) {
    <div class="error-message">⚠️ {{ errorMessage }}</div>
  }

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Email:</label>
      <input formControlName="email" type="email" placeholder="ejemplo@correo.com">
    </div>

    <div class="form-group">
      <label>Contraseña:</label>
      <input formControlName="password" type="password" placeholder="********">
    </div>

    <button type="submit" [disabled]="loginForm.invalid">Entrar</button>
  </form>

  <p>¿No tienes cuenta? <a routerLink="/register">Regístrate ahora</a></p>
</div>
